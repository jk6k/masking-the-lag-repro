meta:
  tag: "20260427_fuller_final_unreserved_datafig_rebuild"
  goal: "prepare the final unreserved Fig10 current-basis scaling rebuild"
  preflight_status: "blocked_until_scaling_schema_covers_declared_final_grid"

inputs:
  design_contract_yaml: "configs/fuller_implementation_experiment_design_contract_20260403_det_sparse_mlx_final_cpu_context_repair_xs_xxs_dense.yaml"
  phase1_template_yaml: "configs/fuller_det_sparse_reentry_slice_template_20260331.yaml"
  imagenet_val: "experiments/datasets/imagenet/val"
  weights_npz_manifest: "experiments/results/accuracy/mlx_weights_20260403_det_sparse_mlx_final_cpu_context_repair_xs_xxs_dense/manifest.json"

paths:
  generated_config_dir: "experiments/results/generated_configs/20260427_fuller_final_unreserved_datafig_rebuild"
  execution_manifest_csv: "experiments/results/report_data/fuller_execution_manifest_20260427_fuller_final_unreserved_datafig_rebuild.csv"
  noise_manifest_csv: "experiments/results/report_data/fuller_noise_execution_manifest_20260427_fuller_final_unreserved_datafig_rebuild.csv"
  noise_raw_accuracy_dir: "experiments/results/accuracy/20260427_fuller_final_unreserved_datafig_rebuild/noise"

device_measurement:
  devices: ["mps"]
  model: "mobilevit_s"
  mps_accuracy_backend: "mlx"
  batch_size: 1
  max_eval_samples: 64
  quant_bits: 8
  power_sampler: "powermetrics"
  profiler_interval_ms: 200
  use_sudo_powermetrics: false
  interactive_sudo_powermetrics: false
  osascript_admin_powermetrics: true
  repeats: 3

ablation:
  model: "mobilevit_s"
  variants:
    - variant_id: "ASTRA"
      experiment_id: "E0"
      switches:
        meso: false
        flow: false
        det: false
        sparse: false
        phy: false
    - variant_id: "DET"
      experiment_id: "E3"
      switches:
        meso: false
        flow: true
        det: true
        sparse: false
        phy: false
    - variant_id: "SPARSE"
      experiment_id: "E4"
      switches:
        meso: false
        flow: true
        det: false
        sparse: true
        phy: false
    - variant_id: "FULLER"
      experiment_id: "E6"
      switches:
        meso: true
        flow: true
        det: true
        sparse: true
        phy: true

scaling:
  model: "mobilevit_s"
  models:
    - "mobilevit_s"
    - "mobilevit_xs"
    - "mobilevit_xxs"
  variants:
    - "ASTRA"
    - "DET"
    - "SPARSE"
    - "FULLER"
  points:
    - scale_id: "B1_S128"
      batch_size: 1
      sequence_length: 128
    - scale_id: "B1_S197"
      batch_size: 1
      sequence_length: 197
    - scale_id: "B1_S256"
      batch_size: 1
      sequence_length: 256
    - scale_id: "B2_S128"
      batch_size: 2
      sequence_length: 128
    - scale_id: "B2_S197"
      batch_size: 2
      sequence_length: 197
    - scale_id: "B2_S256"
      batch_size: 2
      sequence_length: 256
    - scale_id: "B4_S128"
      batch_size: 4
      sequence_length: 128
    - scale_id: "B4_S197"
      batch_size: 4
      sequence_length: 197
    - scale_id: "B4_S256"
      batch_size: 4
      sequence_length: 256

noise:
  accuracy_backend: "mlx"
  eval_batch_size: 32
  max_eval_samples: 256
  seed_policy:
    default_seeds: [0]
    dense_representative_profiles:
      - profile: "clean"
        gaussian_noise_std: 0.0
        crosstalk_alpha: 0.0
        extra_seeds: [1, 2]
  dense:
    model: "mobilevit_s"
    crosstalk_alpha: [0.0]
    gaussian_noise_std: [0.0]
  dense_support:
    - model: "mobilevit_xs"
      crosstalk_alpha: [0.0]
      gaussian_noise_std: [0.0]
    - model: "mobilevit_xxs"
      crosstalk_alpha: [0.0]
      gaussian_noise_std: [0.0]

final_unreserved_contract:
  output_csv: "experiments/results/quick_reports/20260427_fuller_final_unreserved_datafig_rebuild/fig10_scaling_support_current_basis.csv"
  declared_model_variants: ["MobileViT-S", "MobileViT-XS", "MobileViT-XXS"]
  declared_methods: ["ASTRA", "DET", "SPARSE", "FULLER"]
  required_batch_sizes: [1, 2, 4]
  required_sequence_lengths: [128, 197, 256]
  required_flow_buffer_peak_frac_status: ["measured", "derived_from_trace", "not_applicable_for_baseline"]
  blocker_note: "The current legacy planner has one scaling.model field, so this config records the target contract but is not yet sufficient for the full MobileViT-S/XS/XXS grid."
