meta:
  tag: "20260428_fuller_broad_scaling_flowmeas_smoke"
  goal: "12-job smoke for bounded broader scaling flow-buffer trace measurement"
  preflight_status: "smoke_before_full_broad_scaling_flow_trace"

inputs:
  design_contract_yaml: "configs/fuller_implementation_experiment_design_contract_20260403_det_sparse_mlx_final_cpu_context_repair_xs_xxs_dense.yaml"
  phase1_template_yaml: "configs/fuller_det_sparse_reentry_slice_template_20260331.yaml"
  imagenet_val: "experiments/datasets/imagenet/val"
  weights_npz_manifest: "experiments/results/accuracy/mlx_weights_20260403_det_sparse_mlx_final_cpu_context_repair_xs_xxs_dense/manifest.json"

paths:
  generated_config_dir: "experiments/results/generated_configs/20260428_fuller_broad_scaling_flowmeas_smoke"
  execution_manifest_csv: "experiments/results/report_data/fuller_execution_manifest_20260428_fuller_broad_scaling_flowmeas_smoke.csv"
  noise_manifest_csv: "experiments/results/report_data/fuller_noise_execution_manifest_20260428_fuller_broad_scaling_flowmeas_smoke.csv"
  noise_raw_accuracy_dir: "experiments/results/accuracy/20260428_fuller_broad_scaling_flowmeas_smoke/noise"

device_measurement:
  devices: ["mps"]
  model: "mobilevit_s"
  mps_accuracy_backend: "mlx"
  batch_size: 1
  max_eval_samples: 64
  quant_bits: 8
  power_sampler: "powermetrics"
  profiler_interval_ms: 200
  use_sudo_powermetrics: false
  interactive_sudo_powermetrics: false
  osascript_admin_powermetrics: true
  repeats: 2

ablation:
  model: "mobilevit_s"
  variants:
    - variant_id: "ASTRA"
      experiment_id: "E0"
      switches:
        meso: false
        flow: false
        det: false
        sparse: false
        phy: false
    - variant_id: "FULLER"
      experiment_id: "E6"
      switches:
        meso: true
        flow: true
        det: true
        sparse: true
        phy: true

scaling:
  model: "mobilevit_xxs"
  models:
    - "mobilevit_xxs"
  variants:
    - "ASTRA"
    - "FULLER"
  repeats: 2
  points:
    - scale_id: "B1_S128"
      batch_size: 1
      sequence_length: 128
      grid_role: "declared_expanded_grid"
    - scale_id: "HOLDOUT_B3_S160"
      batch_size: 3
      sequence_length: 160
      grid_role: "holdout"
    - scale_id: "B8_S384"
      batch_size: 8
      sequence_length: 384
      grid_role: "declared_expanded_grid"

noise:
  accuracy_backend: "mlx"
  eval_batch_size: 32
  max_eval_samples: 256
  seed_policy:
    default_seeds: [0]
    dense_representative_profiles:
      - profile: "clean"
        gaussian_noise_std: 0.0
        crosstalk_alpha: 0.0
        extra_seeds: [1, 2]
  dense:
    model: "mobilevit_s"
    crosstalk_alpha: [0.0]
    gaussian_noise_std: [0.0]
  dense_support:
    - model: "mobilevit_xxs"
      crosstalk_alpha: [0.0]
      gaussian_noise_std: [0.0]

final_unreserved_contract:
  output_csv: "experiments/results/quick_reports/20260428_fuller_broad_scaling_flowmeas_smoke/fig10_broad_scaling_flow_buffer_current_basis.csv"
  declared_model_variants: ["MobileViT-XXS"]
  declared_methods: ["ASTRA", "FULLER"]
  required_repeat_count: 2
  required_flow_buffer_peak_frac_status: ["measured", "not_applicable_for_baseline"]
  claim_boundary: "smoke_only_no_promotion"
