      - "{lane_run_output_dir}/master_metrics.csv"
      - "{lane_run_output_dir}/per_layer_accuracy.csv"
      - "{lane_run_output_dir}/timeline_summary.csv"
      - "{lane_run_output_dir}/det_prefix_error.csv"
      - "{launch_progress_root}/manifest.json"
    claim_boundary: "bounded DET control evidence only; no cross-lane promotion without integrated replay"
    forbidden_promotions:
      - "analysis_grade_without_explicit_gate"
      - "benchmark_claim_from_runtime_smoke_control_lane"
      - "archived_row_relabel"
  - variant_id: "SPARSE"
    internal_experiment_id: "E4"
    module_role: "active_bounded_activity_lane"
