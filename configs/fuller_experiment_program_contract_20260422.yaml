meta:
  tag: "20260422_fuller_experiment_program_v2"
  goal: "replace the legacy high-cost runtime_smoke surface with a contract-first engineering smoke and analysis-grade split"

governance:
  required_device: "mps"
  launch_wrapper:
    - "caffeinate"
    - "-dimsu"
  cpu_fallback_forbidden: true
  archived_row_relabel_forbidden: true
  analysis_grade_requires_explicit_gate: true
  runtime_smoke_serial_policy: "single_mps_serial_queue"

engineering_smoke:
  manifest_seed: 0
  full_eval_manifest_csv: "experiments/results/accuracy/splits_quickpack_20260212/imagenet_val_eval.csv"
  limited_runtime_surface_scope: "limited_linear_attention_pilot"
  budgets:
    ASTRA:
      sample_budget: 512
      pass_mode: "paired"
      baseline_cache_policy: "produce"
    MESO:
      sample_budget: 512
      pass_mode: "quantized_only"
      baseline_cache_policy: "reuse_required"
    HOPS:
      sample_budget: 512
      pass_mode: "quantized_only"
      baseline_cache_policy: "reuse_required"
    DET:
      sample_budget: 512
      pass_mode: "quantized_only"
      baseline_cache_policy: "reuse_required"
    SPARSE:
      sample_budget: 512
      pass_mode: "quantized_only"
      baseline_cache_policy: "reuse_required"
    PHY:
      sample_budget: 512
      pass_mode: "quantized_only"
      baseline_cache_policy: "reuse_required"
    FULLER:
      sample_budget: 256
      pass_mode: "quantized_only"
      baseline_cache_policy: "reuse_required"

analysis_grade:
  canonical_baseline_lane: "ASTRA"
  baseline_reference_seed: 0
  claim_lane_scope: ["ASTRA", "MESO", "HOPS", "DET", "SPARSE", "FULLER"]
  redirected_support_lanes:
    PHY: "realism_calibration_support"
  lane_budgets:
    ASTRA:
      sample_budget: 45000
      pass_mode: "paired"
      baseline_cache_policy: "produce"
    MESO:
      sample_budget: 45000
      pass_mode: "quantized_only"
      baseline_cache_policy: "reuse_required"
    HOPS:
      sample_budget: 45000
      pass_mode: "quantized_only"
      baseline_cache_policy: "reuse_required"
    DET:
      sample_budget: 45000
      pass_mode: "quantized_only"
      baseline_cache_policy: "reuse_required"
    SPARSE:
      sample_budget: 45000
      pass_mode: "quantized_only"
      baseline_cache_policy: "reuse_required"
    FULLER:
      sample_budget: 45000
      pass_mode: "quantized_only"
      baseline_cache_policy: "reuse_required"
  phase4_eligible: true
  full_dataset_required: true
  legacy_replacement_policy: "archive_and_replace"

sources:
  phase1_runtime_smoke_bundle: "configs/fuller_phase1_runtime_smoke_current_bundle_20260421.yaml"
  phase2_modeling_contract: "configs/fuller_phase2_modeling_contract_20260421.yaml"
  phase2_gate_matrix_csv: "experiments/results/report_data/fuller_phase2_modeling_gate_matrix_20260421.csv"
  phase2_handoff_contract_csv: "experiments/results/report_data/fuller_phase2_phase4_handoff_contract_20260421.csv"
  phase3_execution_contract: "configs/fuller_phase3_execution_contract_20260422.yaml"
  phase3_execution_packet_csv: "experiments/results/report_data/fuller_phase3_execution_packet_20260422.csv"
  phase3_blocker_matrix_csv: "experiments/results/report_data/fuller_phase3_blocker_matrix_20260422.csv"
  phase3_efficiency_contract: "configs/fuller_phase3_execution_efficiency_contract_20260422.yaml"
  phase3_efficiency_audit_csv: "experiments/results/report_data/fuller_phase3_efficiency_audit_20260422.csv"
  phase3_serial_launch_queue_csv: "experiments/results/report_data/fuller_phase3_serial_launch_queue_20260422.csv"
  phase3_serial_launch_status_json: "experiments/results/report_data/fuller_phase3_serial_launch_status_20260422.json"
  host_tuning_profile_json: "configs/fuller_host_tuning_profile_20260424.json"
  legacy_implementation_design_contract: "configs/fuller_implementation_experiment_design_contract_20260319.yaml"
  legacy_implementation_execution_bundle: "configs/fuller_implementation_execution_bundle_20260319.yaml"

coordination:
  active_phase_plan_md: "docs/reports/20260421_fuller_phase1_phase4_execution_plan.md"
  active_readme_md: "docs/coordination/active/README.md"
  phase35_status_md: "docs/coordination/active/PHASE35_STATUS.md"
  expected_active_pointer: "docs/reports/20260421_fuller_phase1_phase4_execution_plan.md"
  forbidden_legacy_pointer: "docs/reports/20260421_true_sc_phase1_phase4_execution_plan.md"

lanes:
  - variant_id: "ASTRA"
    internal_experiment_id: "E0"
    module_role: "substrate_anchor"
    module_specific_fields:
      - "acc_top1"
      - "acc_drop_pp"
      - "accuracy_measurement_contract_status"
      - "realism_class"
    phase4_required_outputs:
      - "{lane_run_output_dir}/phase1_summary.csv"
      - "{lane_run_output_dir}/master_metrics.csv"
      - "{lane_run_output_dir}/per_layer_accuracy.csv"
      - "{lane_run_output_dir}/timeline_summary.csv"
      - "{launch_progress_root}/manifest.json"
    claim_boundary: "bounded anchor validation only; current runtime_smoke anchor input is not analysis-grade evidence"
    forbidden_promotions:
      - "analysis_grade_without_explicit_gate"
      - "benchmark_claim_from_runtime_smoke_anchor"
      - "archived_row_relabel"
  - variant_id: "MESO"
    internal_experiment_id: "E1"
    module_role: "support_cost_topology_layer"
    module_specific_fields:
      - "fanout"
      - "topology_dimension"
      - "meso_cost_model_mode"
      - "serializers_saved"
      - "explicit_total_cost_j"
      - "net_energy_gain_j"
      - "meso_cost_evidence"
    phase4_required_outputs:
      - "{lane_run_output_dir}/phase1_summary.csv"
      - "{lane_run_output_dir}/master_metrics.csv"
      - "{lane_run_output_dir}/per_layer_accuracy.csv"
      - "{lane_run_output_dir}/timeline_summary.csv"
      - "{launch_progress_root}/manifest.json"
    claim_boundary: "support-only meso evidence; no direct promotion to integrated benchmark readiness"
    forbidden_promotions:
      - "analysis_grade_without_explicit_gate"
      - "benchmark_claim_from_support_only_lane"
      - "archived_row_relabel"
  - variant_id: "HOPS"
    internal_experiment_id: "E2"
    module_role: "primary_scheduling_lane"
    module_specific_fields:
      - "hops_scheduler_mode"
      - "stage_cycles"
      - "bubble_cycles"
      - "utilization_avg"
      - "flow_timeline_evidence"
      - "flow_buffer_peak_cycles"
      - "flow_buffer_peak_frac"
      - "flow_residency_hit_rate"
      - "flow_control_backpressure"
      - "flow_eviction_count"
      - "flow_admission_stalls"
    phase4_required_outputs:
      - "{lane_run_output_dir}/phase1_summary.csv"
      - "{lane_run_output_dir}/master_metrics.csv"
      - "{lane_run_output_dir}/per_layer_accuracy.csv"
      - "{lane_run_output_dir}/timeline_summary.csv"
      - "{lane_run_output_dir}/per_layer_timeline.csv"
      - "{lane_run_output_dir}/flow_buffer_trace.csv"
      - "{launch_progress_root}/manifest.json"
    claim_boundary: "bounded HOPS scheduler/runtime evidence only; no benchmark-equivalence promotion"
    forbidden_promotions:
      - "analysis_grade_without_explicit_gate"
      - "benchmark_claim_from_runtime_smoke_scheduler_lane"
      - "archived_row_relabel"
  - variant_id: "DET"
    internal_experiment_id: "E3"
    module_role: "active_bounded_control_lane"
    module_specific_fields:
      - "det_policy"
      - "det_k_signature"
      - "det_quality_gate_status"
      - "det_quality_gate_policy"
      - "det_quality_gate_reason"
      - "det_quality_gate_fallback_policy"
    phase4_required_outputs:
