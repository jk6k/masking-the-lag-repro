  forbidden_legacy_pointer: docs/reports/20260421_true_sc_phase1_phase4_execution_plan.md

host_tuning:
  host_memory_gb: 24.0
  perf_core_count: 5
  auto_workers_mps: 5
  tuned_workers: 4
  tuned_eval_batch_size: 48
  tuning_note: resumed runtime_smoke queue uses a steadier host-tuned profile after MESO hit SIGKILL on the 5-worker / 64-batch quantized pass; the 2026-04-22 MESO microbench favored 4 workers with eval_batch_size 48 over the earlier 32-batch restart profile
  serial_queue_order:
    - ASTRA
    - MESO
    - HOPS
    - DET
    - SPARSE
    - PHY
    - FULLER

governance:
  required_device: mps
  long_run_wrapper:
    - caffeinate
    - -dimsu
  cpu_fallback_forbidden: true
  archived_row_relabel_forbidden: true
  analysis_grade_enabled: false
  benchmark_claim_ready: false
  authorization_required_before_long_run: true
  stop_on_failure: true
