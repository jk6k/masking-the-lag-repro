canonical_chain:
  tag: "20260331_det_sparse_mlx_final"
  description: "Governed DET/SPARSE MLX final-freeze slice for HOPS + MESO + DET + SPARSE + PHY"

baseline_substrate:
  family: "ASTRA-style"
  role: "baseline_execution_substrate"
  deterministic_structure_explicit: true
  shared_conversion_serialization_present: true
  novelty_guardrail: "baseline_only_not_active_layer"

reentry_lane:
  experiment_family: "FULLER_REENTRY_V1"
  det_candidate_yaml: "configs/det_reentry_candidate_template_20260331.yaml"
  sparse_operating_point_yaml: "configs/sparse_reentry_operating_point_contract_20260331.yaml"
  device_claim_note_md: "docs/reports/20260331_det_sparse_reentry_device_claim_note.md"
  promotion_note_md: "docs/reports/20260331_det_sparse_reentry_promotion_note.md"

run:
  run_id: "20260331_fuller_reentry_v1_mobilevit_s"
  experiment_id: "FULLER_REENTRY_V1"
  seed: 0
  device: "mps"
  execution_surface: "host_unsandboxed_caffeinate_required"
  long_run_launch_prefix:
    - "caffeinate"
    - "-dimsu"
  git_hash: "nogit"
  notes: "formal fuller reentry lane with DET and the retained SPARSE operating point"

data:
  workload_id: "W0_mobilevit_imagenet"
  split: "eval"
  batch_size: 1
  sequence_length: 197

switches:
  meso: true
  flow: true
  det: true
  sparse: true
  phy: true

models:
  keys: ["mobilevit_s"]
  accuracy_reference: "fp32"

realism:
  current_class: "realistic_accelerator_proxy"
  target_class: "realistic_accelerator_proxy"
  calibration_profile_yaml: "experiments/results/generated_configs/20260331_det_sparse_mlx_final/support/fuller_realistic_proxy_calibration_profile_20260331_det_sparse_mlx_final.yaml"
  device_comparison_scope: "contextual_only"
  benchmark_equivalence: false
  benchmark_claim_ready: false

accuracy:
  source_csv: "experiments/results/accuracy/accuracy_config_conditioned_20260331_det_sparse_mlx_final_mlx_seeds012.csv"
  delta_pp_budget: 1.0
  context_run_id: "20260331_det_sparse_mlx_final_core_e6"
  require_context_match: false

bitstream:
  enabled: false
  execution_semantics: "proxy"
  default_execution_semantics: "proxy"
  encoding_mode: "bipolar"
  multiplier_mode: "xnor"
  stream_length: 64
  generator: "low_discrepancy"
  generator_policy_matrix_csv: ""
  accumulator_mode: "bitcount"
  calibration_source: ""
  capture_manifest_csv: ""
  trust_contract:
    fail_mode: "fail_closed_to_comparator"

dark_launch:
  enabled: false
  candidate_label: "sc_default_candidate"
  comparator_label: "historical_proxy"
  comparator_execution_semantics: "proxy"

sc_det:
  encoding: "bipolar"
  quant_bits: 8
  bsl_max_rule: "2^(b-1)+1"
  bsl_max: 129
  det_mode: "reorder"
  reorder_mode_scale: 1.0
  replace_mode_scale: 1.0
  det_overhead_j: 0.0002
  overhead:
    seq_gen_j: 0.00012
    counter_j: 0.00005
    ctrl_j: 0.00003
  early_stop:
    enabled: true
    k_grid: [1, 2, 4, 8, 16, 32, 64, 129]
    k_global: 64
    k_by_layer: null
  prefix_error:
    enabled: true
    k_grid: null
    num_prob_points: 129
    p_min: 1.0e-3
    p_max: 0.999
    error_to_acc_pp_scale: 100.0
    phase_shift: 0
    scramble_seed: 0
    enforce_monotonic: true
  delta_pp: 1.0

sparse:
  enabled: true
  tau_mode: "per_layer"
  tau_global: 0.25
  tau_by_layer: null
  use_tau_for_gating: true
  tau_decay: 0.5
  min_active_fraction: 0.05
  tau_to_active_curve: []
  tau_to_acc_pp_coeff: 0.0
  accuracy_proxy_enabled: false
  active_fraction: 0.75

meso:
  enabled: true
  cost_model_mode: "explicit_topology_v1"
  evidence_type: "retained_model_calibrated"
  calibration_source: "experiments/results/generated_configs/20260331_det_sparse_mlx_final/support/quickscan_e1_fanout_sweep_20260331_det_sparse_mlx_final.csv"
  load_scale: 0.85
  broadcast_overhead_mj: 0.1
  broadcast_overhead_ms: 0.0
  fanout: 4
  fanout_policy: explicit
  reuse_provenance_csv: ""
  reuse_provenance_metric: filter_reuse_fanout_under_operand_reuse
  reuse_provenance_aggregate: p50
  reuse_provenance_class_allowlist: []
  reuse_provenance_risk_allowlist: []
  fanout_clip_min: 2
  fanout_clip_max: 32
  topology_dimension: 1.0
  topology_dimension_policy: explicit
  topology_branch_factor: 8
  serializers_per_tile: 1
  serializers_saved: null
  serializer_energy_j: 2.8835646666666693e-06
  broadcast_driver_energy_j: null
  fabric_control_overhead_j: 0.0
  extra_buffering_overhead_j: 0.0
  serializer_power_mw: null
  broadcast_driver_power_mw: 10.0
  fabric_control_power_mw: null
  extra_buffering_power_mw: null

flow:
  enabled: true
  evidence_type: "retained_model_calibrated"
  calibration_source: "experiments/results/runs/20260331_det_sparse_mlx_final_core_e0/master_metrics.csv;experiments/results/runs/20260331_det_sparse_mlx_final_core_e2/master_metrics.csv"
  latency_scale: 1.0
  buffer_depth: 2
  overlap_efficiency: 0.7820744304559356
  staging_cost_scale: 1.0
  sync_penalty_scale: 1.0

phy:
  enabled: true
  evidence_type: "retained_model_calibrated"
  calibration_source: "experiments/results/generated_configs/20260331_det_sparse_mlx_final/support/quickscan_e5_phy_n_sweep_20260331_det_sparse_mlx_final.csv;experiments/results/generated_configs/20260331_det_sparse_mlx_final/support/phase6_scope_report_20260331_det_sparse_mlx_final.md"
  closure: "P0"
  ber_target: 1.0e-12
  er_db: 6
  p_sensitivity_dbm: -20
  pp_extinction_db: 2
  margin_db: 4
  wdm_channels_n: 16
  sweep_wdm_channels: [4, 8, 16, 32]
  loss_path_db:
    waveguide: 2.0
    splitter: 0.5
    combiner: 0.5
    mrr: 1.5
    mzi: 0.0
    other: 0.5
  crosstalk:
    model: "parametric"
    xtalk_db: -20
    pp_crosstalk_db: null
    phy_penalty_table_version: "parametric-v1"

layout_thermal:
  s_wg_min: 2.3
  P_thermal_tuning: 12.5
  p_thermal_tuning_mw: 12.5

p1_align:
  p1_alignment_points_db: [0, -3, -6]
  auto_from_accuracy_csv: false
  target_acc_drop_pp: null
  quant_bits: null
  gaussian_noise_sigma_lsb_ref: 0.0
  crosstalk_alpha_ref: 0.0
  fit_error: 0.0
  gaussian_noise_sigma_lsb_per_3db: 0.1
  crosstalk_alpha_per_3db: 0.02
  p_laser_dbm_ref: null

energy_model:
  energy_model_mode: "UpperBound"
  upperbound_scale: 1.0
  countbased_scale: 0.9

integrated_system_costs:
  enabled: true
  mode: "integrated_minimal_v1"
  calibration_source: "experiments/results/generated_configs/20260331_det_sparse_mlx_final/support/fuller_realistic_proxy_support_manifest_20260331_det_sparse_mlx_final.json"
  uncertainty_method: "bounded_envelope"
  onchip_scale_vs_move: 0.10
  onchip_comm_evidence_type: "bounded_envelope_calibrated"
  control_sched_scale_vs_conv: 0.10
  control_sched_evidence_type: "bounded_envelope_calibrated"
  host_staging_scale_vs_conv: 0.05
  host_staging_evidence_type: "bounded_envelope_calibrated"
  calibration_monitoring_scale_vs_thermal: 0.0
  calibration_monitoring_evidence_type: "bounded_envelope_calibrated"
  host_staging_flow_only: true
  calibration_monitoring_phy_or_noise_only: true

noise_injection:
  enabled: false
  model: "M2"
  gaussian_noise_sigma_lsb: 0.0
  crosstalk_alpha: 0.0
  enable_attention: true

mtl:
  enabled: true
  ops_dir: "mtl_model/ops"
  config_path: "mtl_model/mtl_config_asic.yaml"
  ops_output_subdir: "mtl_ops"

baseline_ref:
  e0_latency_csv: "experiments/results/runs/20260331_det_sparse_mlx_final_core_e0/phase1_summary.csv"

outputs:
  out_dir: "experiments/results/runs"
  master_csv: "experiments/results/master_metrics.csv"
  append_master: false
  save_config_snapshot: true
  save_layer_tables: true
  save_calibration_log: true
