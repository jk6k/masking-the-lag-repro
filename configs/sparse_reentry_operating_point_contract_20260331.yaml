operating_point:
  operating_point_label: "sparse_active_fraction_075_mobilevit_s_v1"  # Legacy compatibility label retained for CSV/file continuity.
  mechanism_version: "SPARSE deployable tau-first operating point v1"
  definition_note_md: "docs/reports/20260331_sparse_reentry_operating_point_note.md"
  control_mode: "tau_threshold_primary"
  promotion_accuracy_basis: "measured_full_eval_baseline_quant_with_repaired_sparse_propagation"
  projection_rows_role: "historical_context_only"
  historical_tau_context:
    - "tau=0.05 subset-measured anchor"
    - "tau=0.25 repaired full-eval anchor"
  formal_raw_run_required: true

canonical_chain:
  tag: "20260331_sparse_reentry_v1"
  description: "Dedicated SPARSE operating-point lane with tau-threshold gating and repaired duty-cycle propagation"

baseline_substrate:
  family: "ASTRA-style"
  role: "baseline_execution_substrate"
  deterministic_structure_explicit: true
  shared_conversion_serialization_present: true
  novelty_guardrail: "baseline_only_not_active_layer"

run:
  run_id: "20260331_sparse_reentry_operating_point_mobilevit_s"
  experiment_id: "SPARSE_REENTRY_V1"
  seed: 0
  device: "mps"
  execution_surface: "host_unsandboxed_caffeinate_required"
  long_run_launch_prefix:
    - "caffeinate"
    - "-dimsu"
  git_hash: "nogit"
  notes: "formal SPARSE tau-first operating-point reentry on bounded MobileViT route"

data:
  workload_id: "W0_mobilevit_imagenet"
  split: "eval"
  batch_size: 1
  sequence_length: 197

switches:
  meso: false
  flow: false
  det: false
  sparse: true
  phy: false

models:
  keys: ["mobilevit_s"]
  accuracy_reference: "fp32"

realism:
  current_class: "bounded_operating_point_reentry"
  target_class: "bounded_operating_point_reentry"
  device_comparison_scope: "not_for_device_claims"
  benchmark_equivalence: false
  benchmark_claim_ready: false

accuracy:
  source_csv: "experiments/results/accuracy/accuracy_config_conditioned_mps_fulleval_repaired_perfpatched_e0e2e3e4e6_seeds012_20260326.csv"
  delta_pp_budget: 1.0
  context_run_id: "20260228_opt_sync_core_e4"
  require_context_match: false

sc_det:
  encoding: "bipolar"
  quant_bits: 8
  bsl_max_rule: "2^(b-1)+1"
  bsl_max: 129
  det_mode: "reorder"
  reorder_mode_scale: 1.0
  replace_mode_scale: 1.0
  det_overhead_j: 0.0
  overhead:
    seq_gen_j: 0.0
    counter_j: 0.0
    ctrl_j: 0.0
  early_stop:
    enabled: false
    k_grid: [1, 2, 4, 8, 16, 32, 64, 129]
    k_global: 129
    k_by_layer: null
  prefix_error:
    enabled: true
    k_grid: null
    num_prob_points: 129
    p_min: 1.0e-3
    p_max: 0.999
  delta_pp: 1.0

sparse:
  enabled: true
  tau_mode: "per_layer"
  tau_global: 0.25  # Primary governed sparse control knob.
  tau_by_layer: null
  use_tau_for_gating: true
  tau_decay: 0.5
  min_active_fraction: 0.05
  tau_to_active_curve: []
  tau_to_acc_pp_coeff: 0.0
  accuracy_proxy_enabled: false
  active_fraction: 0.75  # Compatibility/measured-duty anchor retained for legacy labels/exports.

meso:
  enabled: false

flow:
  enabled: false

phy:
  enabled: false

layout_thermal:
  s_wg_min: 2.3
  P_thermal_tuning: 12.5
  p_thermal_tuning_mw: 12.5

p1_align:
  p1_alignment_points_db: [0, -1, -2, -3, -4, -5, -6, -8, -10, -12]
  auto_from_accuracy_csv: true
  target_acc_drop_pp: null
  quant_bits: null
  gaussian_noise_sigma_lsb_ref: 0.0
  crosstalk_alpha_ref: 0.0
  fit_error: 0.0
  gaussian_noise_sigma_lsb_per_3db: 0.1
  crosstalk_alpha_per_3db: 0.02
  p_laser_dbm_ref: null

integrated_system_costs:
  enabled: false
  mode: "disabled"

energy_model:
  energy_model_mode: "UpperBound"
  upperbound_scale: 1.0
  countbased_scale: 0.9

noise_injection:
  enabled: false
  model: "M2"
  gaussian_noise_sigma_lsb: 0.0
  crosstalk_alpha: 0.0
  enable_attention: true

mtl:
  enabled: true
  ops_dir: "mtl_model/ops"
  config_path: "mtl_model/mtl_config_asic.yaml"
  ops_output_subdir: "mtl_ops"

baseline_ref:
  e0_latency_csv: "experiments/results/runs/20260228_opt_sync_core_e0/phase1_summary.csv"

outputs:
  out_dir: "experiments/results/runs"
  master_csv: "experiments/results/master_metrics.csv"
  append_master: false
  save_config_snapshot: true
  save_layer_tables: true
  save_calibration_log: true
